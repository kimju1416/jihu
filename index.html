<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동창회 추억의 타임머신 (1980-2026)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --primary: #ff0055;
            --secondary: #00ffff;
            --card-bg: #1a1a24;
            --border-color: #ffffff;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'NeoDunggeunmo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px 15px;
            text-align: center;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header-title {
            color: var(--secondary);
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px var(--primary);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #ffff00;
            margin-bottom: 40px;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0px #000;
        }

        /* 아케이드 스타일 플레이어 컨테이너 */
        .player-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 40px auto;
            background-color: #000;
            border: 4px solid var(--border-color);
            box-shadow: 8px 8px 0px var(--primary);
            display: none;
            position: relative;
        }

        .now-playing {
            padding: 15px;
            background-color: var(--primary);
            color: #fff;
            font-size: 1.5rem;
            border-bottom: 4px solid var(--border-color);
            text-shadow: 2px 2px 0px #000;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 8비트 버튼 그리드 */
        .year-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .year-card {
            background-color: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 15px 10px;
            cursor: pointer;
            position: relative;
            box-shadow: 4px 4px 0px var(--secondary);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100px;
        }

        .year-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--primary);
            background-color: #2a2a35;
        }

        .year-card:active, .year-card.active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--primary);
            background-color: var(--primary);
            border-color: #fff;
        }

        .year-card.active .song-info, .year-card.active .year-badge {
            color: #fff;
            text-shadow: 2px 2px 0px #000;
        }

        .year-badge {
            color: var(--secondary);
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0px #000;
        }

        .song-info {
            font-size: 0.9rem;
            color: #ddd;
            line-height: 1.4;
            word-break: keep-all;
        }

        /* 스캔라인 효과 (화면 덮기) */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <p class="subtitle">▶ PUSH START : 학번(연도)을 선택하세요 ◀</p>

        <div class="video-wrapper">
            <iframe id="youtubePlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <div class="year-grid" id="yearGrid"></div>

            { year: 2019, title: "작은 것들을 위한 시", artist: "방탄소년단", ytId: "XsX3ATc3FbA", start: 45, end: 75 },
            { year: 2020, title: "아무노래", artist: "지코", ytId: "UuV2BmJ1p_I", start: 45, end: 75 },

            { year: 2023, title: "I AM", artist: "IVE", ytId: "6ZUIwj3FgCE", start: 75, end: 105 },
            { year: 2024, title: "첫 만남은 계획대로...", artist: "TWS", ytId: "hVzFVJeXzQ4", start: 60, end: 90 },
            { year: 2025, title: "APT.", artist: "로제 & 브루노 마스", ytId: "ekr2nIex040", start: 48, end: 78 },
            { year: 2026, title: "Supernova", artist: "aespa", ytId: "phuiiNCxRMg", start: 55, end: 85 } // 25~26년도 최신 메가히트곡 배정
        ];

        const yearGrid = document.getElementById('yearGrid');
        const playerContainer = document.getElementById('playerContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const nowPlayingText = document.getElementById('nowPlayingText');
        let currentActiveCard = null;

        // 8비트 스타일 버튼 렌더링
        songData.forEach(song => {
            const card = document.createElement('div');
            card.className = 'year-card';
            card.innerHTML = `
                <div class="year-badge">${song.year}</div>
                <div class="song-info">${song.title}<br>${song.artist}</div>
            `;
            
            card.addEventListener('click', () => {
                if(currentActiveCard) {
                    currentActiveCard.classList.remove('active');
                }
                card.classList.add('active');
                currentActiveCard = card;

                playerContainer.style.display = 'block';
                nowPlayingText.innerText = `[${song.year}] ${song.title} 재생중 ♫`;

                // 유튜브 자동재생 및 구간반복 파라미터 적용
                // 하이라이트 구간만 딱 틀어지게 start와 end 세팅 완료
                const embedUrl = `https://www.youtube.com/embed/${song.ytId}?start=${song.start}&end=${song.end}&autoplay=1&controls=1&rel=0`;
                
                youtubePlayer.src = embedUrl;

                // 클릭 시 상단 플레이어로 부드럽게 스크롤
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            
            yearGrid.appendChild(card);
        });
    </script>
</body>
</html>
